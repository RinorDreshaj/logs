          <svg width="11" height="11" viewBox="0 0 24 24" fill={bookmarks.has(first.id) ? 'currentColor' : 'none'} stroke="currentColor" strokeWidth="2">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </button>
        <button className="wrap-btn" style={{visibility:'hidden'}} />
        <span className="log-time">{fmtTime(first.time)}</span>
        <span className="log-delta" />
        <span className="log-class" style={{color: clsColor(first.cls, lightMode)}}>[{first.cls}]</span>
        <span className="log-msg msg-nowrap" style={{flex:1}}>{highlight(first.msg, searchRegex)}</span>
        <button className="dedup-badge" onClick={() => setOpen(v => !v)} title={open ? 'Collapse duplicates' : 'Expand duplicates'}>
          {open
            ? <><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="5" y1="12" x2="19" y2="12"/></svg> collapse</>
            : <>×{entries.length} repeated &nbsp;▾</>
          }
        </button>
      </div>
      {/* Expanded duplicates */}
      {open && (
        <div className="dedup-expanded">
          {entries.map((e, i) => (
            <LogEntry key={`${e.id}-${globalWrap}`} entry={e} globalWrap={globalWrap} searchRegex={searchRegex} bookmarked={bookmarks.has(e.id)} onBookmark={onBookmark} delta={deltas[startDeltaIdx + i]} isCurrent={currentMatchLogId === e.id} fontSize={fontSize} lightMode={lightMode} onContextMenu={onContextMenu} onHideClass={onHideClass} />
          ))}
        </div>
      )}
    </div>
  );
}

// ── dedup helper: collapse consecutive identical cls+msg runs ─────────────────
function buildDedupGroups(entries) {
  const groups = [];
  let i = 0;
  while (i < entries.length) {
    const key = `${entries[i].cls}\0${entries[i].msg}`;
    let j = i + 1;
    while (j < entries.length && `${entries[j].cls}\0${entries[j].msg}` === key) j++;
    groups.push({ entries: entries.slice(i, j), startDeltaIdx: i });
    i = j;
  }
  return groups;
}

// ── persistence helpers ───────────────────────────────────────────────────────
const LS_FILE_KEY    = 'logfilter_file_v1';
const LS_FILTER_KEY  = 'logfilter_filters_v1';
const LS_PRESETS_KEY = 'logfilter_presets_v1';

function saveFile(fileName, rawText) {
  try { localStorage.setItem(LS_FILE_KEY, JSON.stringify({ fileName, rawText })); } catch (_) {}
}

function saveFilters(filters) {
  try { localStorage.setItem(LS_FILTER_KEY, JSON.stringify(filters)); } catch (_) {}
}

function loadFile() {
  try { const r = localStorage.getItem(LS_FILE_KEY); return r ? JSON.parse(r) : null; } catch (_) { return null; }
}

function loadFilters() {
  try { const r = localStorage.getItem(LS_FILTER_KEY); return r ? JSON.parse(r) : null; } catch (_) { return null; }
}

function clearStorage() {
  try { localStorage.removeItem(LS_FILE_KEY); localStorage.removeItem(LS_FILTER_KEY); } catch (_) {}
}

function loadPresets() {
  try { const r = localStorage.getItem(LS_PRESETS_KEY); return r ? JSON.parse(r) : []; } catch (_) { return []; }
}

function savePresets(presets) {
  try { localStorage.setItem(LS_PRESETS_KEY, JSON.stringify(presets)); } catch (_) {}
}

const LS_SEARCH_HISTORY_KEY = 'logfilter_search_history_v1';
const MAX_HISTORY = 20;

function loadSearchHistory() {
  try { const r = localStorage.getItem(LS_SEARCH_HISTORY_KEY); return r ? JSON.parse(r) : []; } catch (_) { return []; }
}

function pushSearchHistory(term, current) {
  if (!term.trim()) return current;
  const deduped = [term, ...current.filter(t => t !== term)].slice(0, MAX_HISTORY);
  try { localStorage.setItem(LS_SEARCH_HISTORY_KEY, JSON.stringify(deduped)); } catch (_) {}
  return deduped;
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const { useEffect } = React;
  const fileInputRef = useRef(null);
  const searchInputRef = useRef(null);
  const navMatchRef = useRef(null);
  const [fileName, setFileName] = useState('');
  const [logs, setLogs] = useState([]);
  const [checked, setChecked] = useState({});
  const [classSearch, setClassSearch] = useState('');
  const [timeFrom, setTimeFrom] = useState('');
  const [timeTo, setTimeTo]   = useState('');
  const [stringSearch, setStringSearch] = useState('');
  const [regexMode, setRegexMode] = useState(false);
  const [wrapLines, setWrapLines] = useState(true);
  const [copied, setCopied] = useState(false);
  const [bookmarks, setBookmarks] = useState(new Set());
  const [showBookmarks, setShowBookmarks] = useState(false);
  const [levelFilter, setLevelFilter] = useState(null); // null | 'error' | 'warn'
  const [groupByClass, setGroupByClass] = useState(false);
  const [dedupLogs, setDedupLogs] = useState(true);
  const [lightMode, setLightMode] = useState(() => localStorage.getItem('logfilter_theme') === 'light');
  const [fontSize, setFontSize] = useState(() => parseInt(localStorage.getItem('logfilter_fontsize') || '12'));
  const [matchIdx, setMatchIdx] = useState(0);
  const [collapseAll, setCollapseAll] = useState(null); // null=default, true=all collapsed, false=all expanded
  const [ctxMenu, setCtxMenu] = useState(null); // { x, y, cls }
  const [showStats, setShowStats] = useState(false);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [presets, setPresets] = useState(() => loadPresets());
  const [savingPreset, setSavingPreset] = useState(false);
  const [presetName, setPresetName] = useState('');
  const [searchHistory, setSearchHistory] = useState(() => loadSearchHistory());
  const [showHistory, setShowHistory] = useState(false);
  const [historyIdx, setHistoryIdx] = useState(-1); // -1 = not navigating
  const [showPasteModal, setShowPasteModal] = useState(false);
  const [pasteText, setPasteText] = useState('');
  const pasteTextareaRef = useRef(null);

  // apply theme to body
  useEffect(() => {
    document.body.classList.toggle('light', lightMode);
    localStorage.setItem('logfilter_theme', lightMode ? 'light' : 'dark');
  }, [lightMode]);

  // persist font size
  useEffect(() => {
    localStorage.setItem('logfilter_fontsize', fontSize);
  }, [fontSize]);

  const changeFontSize = useCallback((delta) => {
    setFontSize(prev => Math.min(20, Math.max(9, prev + delta)));
  }, []);

  // keyboard shortcuts — use ref so handler always calls latest navMatch
  useEffect(() => {
    const handler = (e) => {
      const meta = e.metaKey || e.ctrlKey;
      if (meta && e.key === 'f') { e.preventDefault(); searchInputRef.current?.focus(); return; }
      if (meta && e.key === 'b') { e.preventDefault(); setShowBookmarks(v => !v); return; }
      if (meta && e.key === '\\') { e.preventDefault(); setSidebarCollapsed(v => !v); return; }
      if (e.key === 'Escape' && document.activeElement === searchInputRef.current) {
        setStringSearch(''); setShowHistory(false); setHistoryIdx(-1); searchInputRef.current?.blur(); return;
      }
      if (e.key === 'Enter' && document.activeElement === searchInputRef.current) {
        e.preventDefault(); navMatchRef.current?.(e.shiftKey ? -1 : 1); return;
      }
      if ((e.key === 'n' || e.key === 'N') && document.activeElement !== searchInputRef.current) {
        navMatchRef.current?.(e.key === 'n' ? 1 : -1); return;
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  // global paste — intercept paste event when not in a text input
  useEffect(() => {
    const handler = (e) => {
      const tag = document.activeElement?.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;
      const text = e.clipboardData?.getData('text') ?? '';
      if (!text.trim()) return;
      e.preventDefault();
      setPasteText(text);
      setShowPasteModal(true);
    };
    window.addEventListener('paste', handler);
    return () => window.removeEventListener('paste', handler);
  }, []);

  const openPasteModal = useCallback(() => {
    setShowPasteModal(true);
    // try to pre-fill from clipboard
    navigator.clipboard?.readText().then(text => {
      if (text.trim()) setPasteText(text);
      setTimeout(() => pasteTextareaRef.current?.focus(), 50);
    }).catch(() => {
      setTimeout(() => pasteTextareaRef.current?.focus(), 50);
    });
  }, []);

  const loadFromPaste = useCallback(() => {
    const text = pasteText.trim();
    if (!text) return;
    loadEntries(text, 'pasted-logs.txt');
    setShowPasteModal(false);
    setPasteText('');
  }, [pasteText, loadEntries]);

  // restore on mount
  useEffect(() => {
    const savedFile = loadFile();
    if (!savedFile) return;
    const entries = parseLogs(savedFile.rawText);
    if (!entries.length) return;
    setFileName(savedFile.fileName);
    setLogs(entries);

    const savedFilters = loadFilters();
    if (savedFilters) {
      // restore checked state, but ensure all classes from the file exist
      const allCls = {};
      for (const e of entries) allCls[e.cls] = true;
      const merged = {};
      for (const cls of Object.keys(allCls)) {
        merged[cls] = cls in savedFilters.checked ? savedFilters.checked[cls] : true;
      }
      setChecked(merged);
      setTimeFrom(savedFilters.timeFrom ?? '');
      setTimeTo(savedFilters.timeTo ?? '');
      setStringSearch(savedFilters.stringSearch ?? '');
      setRegexMode(savedFilters.regexMode ?? false);
      setWrapLines(savedFilters.wrapLines ?? true);
      setClassSearch(savedFilters.classSearch ?? '');
    } else {
      const cls = {};
      for (const e of entries) cls[e.cls] = true;
      setChecked(cls);
    }
  }, []);

  // persist filters whenever they change
  useEffect(() => {
    if (!logs.length) return;
    saveFilters({ checked, timeFrom, timeTo, stringSearch, regexMode, wrapLines, classSearch });
  }, [checked, timeFrom, timeTo, stringSearch, regexMode, wrapLines, classSearch, logs.length]);

  const loadEntries = useCallback((rawText, name) => {
    const entries = parseLogs(rawText);
    setLogs(entries);
    setFileName(name);
    const cls = {};
    for (const e of entries) cls[e.cls] = true;
    setChecked(cls);
    setTimeFrom(''); setTimeTo('');
    setClassSearch(''); setStringSearch('');
    setRegexMode(false); setWrapLines(true);
    setBookmarks(new Set()); setShowBookmarks(false); setLevelFilter(null); setGroupByClass(false); setDedupLogs(true);
    clsColorCache.clear(); clsColorIdx = 0;
    saveFile(name, rawText);
    try { localStorage.removeItem(LS_FILTER_KEY); } catch (_) {}
  }, []);

  const handleFile = useCallback((e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => loadEntries(ev.target.result, file.name);
    reader.readAsText(file);
    e.target.value = '';
  }, [loadEntries]);

  const handleClear = useCallback(() => {
    clearStorage();
    setLogs([]); setFileName(''); setChecked({});
    setTimeFrom(''); setTimeTo('');
    setClassSearch(''); setStringSearch('');
    setBookmarks(new Set()); setShowBookmarks(false); setLevelFilter(null);
  }, []);

  const classCounts = useMemo(() => {
    const map = {};
    for (const e of logs) map[e.cls] = (map[e.cls] || 0) + 1;
    return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0]));
  }, [logs]);

  const filteredClasses = useMemo(() => {
    if (!classSearch.trim()) return classCounts;
    const q = classSearch.toLowerCase();
    return classCounts.filter(([cls]) => cls.toLowerCase().includes(q));
  }, [classCounts, classSearch]);

  const toggleBookmark = useCallback((id) => {
    setBookmarks(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  }, []);

  const toggleLevelFilter = (level) => setLevelFilter(prev => prev === level ? null : level);

  const toggleClass = (cls) => setChecked(prev => ({ ...prev, [cls]: !prev[cls] }));
  const selectAll   = () => setChecked(prev => Object.fromEntries(Object.keys(prev).map(k => [k, true])));
  const deselectAll = () => setChecked(prev => Object.fromEntries(Object.keys(prev).map(k => [k, false])));

  const hideClass  = useCallback((cls) => setChecked(prev => ({ ...prev, [cls]: false })), []);
  const soloClass  = useCallback((cls) => setChecked(prev => Object.fromEntries(Object.keys(prev).map(k => [k, k === cls]))), []);
  const openCtxMenu = useCallback((x, y, cls) => setCtxMenu({ x, y, cls }), []);

  const commitSearch = useCallback((term) => {
    if (!term.trim()) return;
    setSearchHistory(prev => pushSearchHistory(term, prev));
    setShowHistory(false);
    setHistoryIdx(-1);
  }, []);

  const handleSearchKeyDown = useCallback((e) => {
    if (!showHistory && e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      setShowHistory(true);
      setHistoryIdx(prev => {
        const next = Math.min(prev + 1, searchHistory.length - 1);
        if (searchHistory[next]) setStringSearch(searchHistory[next]);
        return next;
      });
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      setHistoryIdx(prev => {
        const next = prev - 1;
        if (next < 0) { setStringSearch(''); setHistoryIdx(-1); setShowHistory(false); return -1; }
        if (searchHistory[next]) setStringSearch(searchHistory[next]);
        return next;
      });
    }
  }, [showHistory, searchHistory]);

  const deleteHistoryItem = useCallback((term) => {
    setSearchHistory(prev => {
      const next = prev.filter(t => t !== term);
      try { localStorage.setItem(LS_SEARCH_HISTORY_KEY, JSON.stringify(next)); } catch (_) {}
      return next;
    });
  }, []);

  const clearHistory = useCallback(() => {
    setSearchHistory([]);
    try { localStorage.removeItem(LS_SEARCH_HISTORY_KEY); } catch (_) {}
  }, []);

  const savePreset = useCallback((name) => {
    if (!name.trim()) return;
    const preset = { id: Date.now(), name: name.trim(), checked, timeFrom, timeTo, stringSearch, regexMode, levelFilter, classSearch };
    const next = [...presets, preset];
    setPresets(next);
    savePresets(next);
    setSavingPreset(false);
    setPresetName('');
  }, [checked, timeFrom, timeTo, stringSearch, regexMode, levelFilter, classSearch, presets]);

  const applyPreset = useCallback((preset) => {
    const merged = {};
    for (const cls of Object.keys(checked)) merged[cls] = cls in preset.checked ? preset.checked[cls] : true;
    setChecked(merged);
    setTimeFrom(preset.timeFrom ?? '');
    setTimeTo(preset.timeTo ?? '');
    setStringSearch(preset.stringSearch ?? '');
    setRegexMode(preset.regexMode ?? false);
    setLevelFilter(preset.levelFilter ?? null);
    setClassSearch(preset.classSearch ?? '');
  }, [checked]);

  const deletePreset = useCallback((id) => {
    const next = presets.filter(p => p.id !== id);
    setPresets(next);
    savePresets(next);
  }, [presets]);

  const fromMs = useMemo(() => parseInputTime(timeFrom), [timeFrom]);
  const toMs   = useMemo(() => parseInputTime(timeTo),   [timeTo]);

  // build search regex (or null)
  const { searchRegex, regexError } = useMemo(() => {
    const raw = stringSearch.trim();
    if (!raw) return { searchRegex: null, regexError: null };
    if (!regexMode) {
      const escaped = raw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return { searchRegex: new RegExp(escaped, 'gi'), regexError: null };
    }
    try {
      return { searchRegex: new RegExp(raw, 'gi'), regexError: null };
    } catch (err) {
      return { searchRegex: null, regexError: err.message };
    }
  }, [stringSearch, regexMode]);

  const visibleLogs = useMemo(() => {
    return logs.filter(e => {
      if (!checked[e.cls]) return false;
      if (fromMs !== null || toMs !== null) {
        const t = parseLogTime(e.time);
        if (t !== null) {
          if (fromMs !== null && t < fromMs) return false;
          if (toMs   !== null && t > toMs)   return false;
        }
      }
      if (searchRegex) {
        searchRegex.lastIndex = 0;
        if (!searchRegex.test(`${e.time} ${e.cls} ${e.msg}`)) return false;
      }
      if (levelFilter && e.level !== levelFilter) return false;
      if (showBookmarks && !bookmarks.has(e.id)) return false;
      return true;
    });
  }, [logs, checked, fromMs, toMs, searchRegex, levelFilter, showBookmarks, bookmarks]);

  const checkedCount = useMemo(() =>
    Object.values(checked).filter(Boolean).length, [checked]);

  // search matches — indices into visibleLogs
  const matchIndices = useMemo(() => {
    if (!searchRegex) return [];
    return visibleLogs.reduce((acc, e, i) => {
      searchRegex.lastIndex = 0;
      if (searchRegex.test(`${e.time} ${e.cls} ${e.msg}`)) acc.push(i);
      return acc;
    }, []);
  }, [visibleLogs, searchRegex]);

  // reset match cursor when matches change
  useEffect(() => { setMatchIdx(0); }, [matchIndices.length, stringSearch]);

  const currentMatchLogId = matchIndices.length > 0 ? visibleLogs[matchIndices[matchIdx]]?.id : null;

  const navMatch = useCallback((dir) => {
    if (!matchIndices.length) return;
    setMatchIdx(prev => {
      const next = (prev + dir + matchIndices.length) % matchIndices.length;
      const targetId = visibleLogs[matchIndices[next]]?.id;
      if (targetId != null) {
        setTimeout(() => {
          logPaneRef.current?.querySelector(`[data-id="${targetId}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 0);
      }
      return next;
    });
  }, [matchIndices, visibleLogs]);
  navMatchRef.current = navMatch;

  const logPaneRef = useRef(null);
  const [currentSession, setCurrentSession] = useState(null);

  // track which session is in view by watching scroll
  useEffect(() => {
    const pane = logPaneRef.current;
    if (!pane) return;
    const update = () => {
      const paneTop = pane.getBoundingClientRect().top;
      // walk all session-marker rows and find the last one above or at the viewport top
      const markers = pane.querySelectorAll('[data-session-marker]');
      let active = null;
      for (const el of markers) {
        const rect = el.getBoundingClientRect();
        if (rect.top <= paneTop + 4) active = el.dataset.sessionMarker;
        else break;
      }
      setCurrentSession(active || null);
    };
    pane.addEventListener('scroll', update, { passive: true });
    update();
    return () => pane.removeEventListener('scroll', update);
  }, [visibleLogs]);

  const handleTimelineJump = useCallback((id) => {
    const el = logPaneRef.current?.querySelector(`[data-id="${id}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, []);

  // delta ms between consecutive visible log entries
  const deltas = useMemo(() => {
    return visibleLogs.map((e, i) => {
      if (i === 0) return null;
      const t0 = parseLogTime(visibleLogs[i-1].time);
      const t1 = parseLogTime(e.time);
      if (t0 === null || t1 === null) return null;
      return Math.max(0, t1 - t0);
    });
  }, [visibleLogs]);

  // group consecutive same-class runs
  const groups = useMemo(() => {
    if (!groupByClass) return null;
    const result = [];
    let i = 0;
    while (i < visibleLogs.length) {
      const cls = visibleLogs[i].cls;
      let j = i + 1;
      while (j < visibleLogs.length && visibleLogs[j].cls === cls) j++;
      result.push({ entries: visibleLogs.slice(i, j), startDeltaIdx: i });
      i = j;
    }
    return result;
  }, [visibleLogs, groupByClass]);

  const dedupGroups = useMemo(() =>
    dedupLogs ? buildDedupGroups(visibleLogs) : null,
  [visibleLogs, dedupLogs]);

  // ── export helpers ──
  const exportTxt = useCallback(() => {
    const content = visibleLogs.map(entryToLine).join('\n');
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName ? `filtered_${fileName}` : 'filtered_logs.txt';
    a.click();
    URL.revokeObjectURL(url);
  }, [visibleLogs, fileName]);

  const copyToClipboard = useCallback(() => {
    const content = visibleLogs.map(entryToLine).join('\n');
    navigator.clipboard.writeText(content).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    });
  }, [visibleLogs]);

  return (
    <>
      {showPasteModal && (
        <div className="paste-modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) { setShowPasteModal(false); setPasteText(''); } }}>
          <div className="paste-modal">
            <div className="paste-modal-header">
              Paste log text
              <button className="paste-modal-close" onClick={() => { setShowPasteModal(false); setPasteText(''); }}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <div className="paste-modal-body">
              <textarea
                ref={pasteTextareaRef}
                value={pasteText}
                onChange={e => setPasteText(e.target.value)}
                placeholder={"Paste your log text here…\n\nExpected format:\nMon Apr 27 2026 at 05:24:30:109 PM :    [ClassName] Message"}
                onKeyDown={e => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); loadFromPaste(); } if (e.key === 'Escape') { setShowPasteModal(false); setPasteText(''); } }}
              />
            </div>
            <div className="paste-modal-footer">
              <span className="paste-modal-hint">{pasteText.trim() ? `${pasteText.trim().split('\n').length} lines` : <><kbd>⌘↵</kbd> to load · <kbd>Esc</kbd> to cancel</>}</span>
              <div className="paste-modal-actions">
                <button className="action-btn" onClick={() => { setShowPasteModal(false); setPasteText(''); }}>Cancel</button>
                <button className="upload-btn" onClick={loadFromPaste} disabled={!pasteText.trim()}>Load logs</button>
              </div>
            </div>
          </div>
        </div>
      )}
      {ctxMenu && (
        <ContextMenu
          x={ctxMenu.x} y={ctxMenu.y} cls={ctxMenu.cls}
          onHideClass={hideClass}
          onSoloClass={soloClass}
          onClose={() => setCtxMenu(null)}
        />
      )}
      {/* Header */}
      <div className="header">
        <h1>Log Filter</h1>
        <button className="upload-btn" onClick={() => fileInputRef.current.click()}>
          Upload .txt
        </button>
        <input ref={fileInputRef} type="file" accept=".txt,.log" style={{display:'none'}} onChange={handleFile} />
        <button className="upload-btn" style={{background:'transparent', border:'1px solid var(--accent)', color:'var(--accent-light)'}} onClick={openPasteModal} title="Paste log text (⌘V)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{marginRight:4, verticalAlign:'middle'}}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
          Paste
        </button>
        {logs.length > 0 && (
          <button className="clear-btn" onClick={handleClear} title="Clear logs">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
            Clear
          </button>
        )}
        {fileName && <span className="file-name">{fileName}</span>}

        {/* String search */}
        <div className="string-search-wrap">
          <div className="string-search">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#818cf8" strokeWidth="2.5">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input
              ref={searchInputRef}
              placeholder={regexMode ? 'Regex search…' : 'Search logs…'}
              value={stringSearch}
              onChange={e => { setStringSearch(e.target.value); setHistoryIdx(-1); }}
              onFocus={() => { if (searchHistory.length) setShowHistory(true); }}
              onBlur={() => { setTimeout(() => setShowHistory(false), 150); commitSearch(stringSearch); }}
              onKeyDown={handleSearchKeyDown}
            />
            {regexError && <span className="regex-error" title={regexError}>!</span>}
            {stringSearch && (
              <svg onClick={() => { setStringSearch(''); setShowHistory(searchHistory.length > 0); }} width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" strokeWidth="2.5" style={{cursor:'pointer',flexShrink:0}}>
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            )}
          </div>
          {showHistory && searchHistory.length > 0 && (
            <div className="search-history-dropdown">
              <div className="search-history-header">
                Recent searches
                <button className="search-history-clear" onClick={clearHistory}>Clear all</button>
              </div>
              {searchHistory.map((term, i) => (
                <div
                  key={term}
                  className={`search-history-item${i === historyIdx ? ' active' : ''}`}
                  onMouseDown={() => { setStringSearch(term); setShowHistory(false); setHistoryIdx(-1); commitSearch(term); }}
                >
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                  {term}
                  <button
                    className="search-history-item-del"
                    onMouseDown={(e) => { e.stopPropagation(); deleteHistoryItem(term); }}
                    title="Remove"
                  >
                    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
        <button
          className={`regex-toggle${regexMode ? ' active' : ''}`}
          onClick={() => setRegexMode(v => !v)}
          title="Toggle regex mode"
        >.*</button>

        {/* Search navigation */}
        {stringSearch && (
          <div className="search-nav">
            <button className="search-nav-btn" onClick={() => navMatch(-1)} disabled={matchIndices.length === 0} title="Previous match (Shift+Enter / N)">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="18 15 12 9 6 15"/></svg>
            </button>
            <span className="search-nav-count">
              {matchIndices.length === 0 ? 'no matches' : `${matchIdx + 1} / ${matchIndices.length}`}
            </span>
            <button className="search-nav-btn" onClick={() => navMatch(1)} disabled={matchIndices.length === 0} title="Next match (Enter / n)">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
          </div>
        )}

        <span style={{fontSize:11,color:'var(--text-faintest)',whiteSpace:'nowrap'}}><kbd>⌘F</kbd> search &nbsp;<kbd>⌘B</kbd> bookmarks &nbsp;<kbd>n</kbd> next &nbsp;<kbd>⌘\</kbd> sidebar</span>

        {/* Level filters + bookmarks */}
        {logs.length > 0 && (
          <div className="level-filters">
            <button className={`level-pill error${levelFilter === 'error' ? ' active' : ''}`} onClick={() => toggleLevelFilter('error')}>ERROR</button>
            <button className={`level-pill warn${levelFilter === 'warn' ? ' active' : ''}`} onClick={() => toggleLevelFilter('warn')}>WARN</button>
            <button className={`level-pill bookmarks${showBookmarks ? ' active' : ''}`} onClick={() => setShowBookmarks(v => !v)}>
              ★ {bookmarks.size > 0 ? bookmarks.size : 'Bookmarks'}
            </button>
          </div>
        )}

        <div className="header-right">
          {/* Wrap toggle */}
          <button
            className={`icon-btn${wrapLines ? ' active' : ''}`}
            onClick={() => setWrapLines(v => !v)}
            title="Toggle line wrap"
          >
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <polyline points="17 10 21 10"/><polyline points="21 10 21 14"/><polyline points="21 14 3 14"/>
              <polyline points="3 14 3 6"/><polyline points="3 6 13 6"/>
            </svg>
            {wrapLines ? 'Wrap on' : 'Wrap off'}
          </button>

          <button className={`icon-btn${dedupLogs ? ' active' : ''}`} onClick={() => setDedupLogs(v => !v)} title="Collapse consecutive identical lines">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
            Dedup
          </button>

          <button className={`icon-btn${groupByClass ? ' active' : ''}`} onClick={() => setGroupByClass(v => !v)} title="Group consecutive same-class lines">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            Group
          </button>

          {/* Font size */}
          <div className="font-ctrl">
            <button className="font-ctrl-btn" onClick={() => changeFontSize(-1)} title="Decrease font size">−</button>
            <span className="font-ctrl-val">{fontSize}</span>
            <button className="font-ctrl-btn" onClick={() => changeFontSize(1)} title="Increase font size">+</button>
          </div>

          {logs.length > 0 && (
            <button className={`icon-btn${showStats ? ' active' : ''}`} onClick={() => setShowStats(v => !v)} title="Session stats">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
              Stats
            </button>
          )}

          <button className="icon-btn" onClick={() => setLightMode(v => !v)} title="Toggle light/dark mode">
            {lightMode
              ? <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              : <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            }
          </button>

          {logs.length > 0 && <span className="stats">{visibleLogs.length} / {logs.length} &nbsp;·&nbsp; {checkedCount} / {classCounts.length} classes</span>}

          {/* Copy */}
          <button
            className={`icon-btn${copied ? ' copied' : ''}`}
            onClick={copyToClipboard}
            disabled={visibleLogs.length === 0}
            title="Copy filtered logs to clipboard"
          >
            {copied
              ? <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
              : <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            }
            {copied ? 'Copied!' : 'Copy'}
          </button>

          {/* Export */}
          <button
            className="icon-btn"
            onClick={exportTxt}
            disabled={visibleLogs.length === 0}
            title="Download filtered logs as .txt"
          >
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Export
          </button>
        </div>
      </div>

      {/* Timeline */}
      {logs.length > 0 && <Timeline logs={logs} visibleLogs={visibleLogs} onJump={handleTimelineJump} />}

      {/* Body */}
      <div className="body">

        {/* Sidebar */}
        <div className={`sidebar${sidebarCollapsed ? ' collapsed' : ''}`}>
          {/* Collapse toggle always visible */}
          <div className="sidebar-collapse-btn-wrap">
            <button className="sidebar-collapse-btn" onClick={() => setSidebarCollapsed(v => !v)} title={sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'}>
              {sidebarCollapsed
                ? <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                : <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>
              }
            </button>
          </div>

          <div className="sidebar-header"><span>Classes</span></div>

          <div className="sidebar-actions">
            <button className="action-btn" onClick={selectAll}>All</button>
            <button className="action-btn" onClick={deselectAll}>None</button>
          </div>

          <div className="sidebar-search">
            <input
              placeholder="Search classes…"
              value={classSearch}
              onChange={e => setClassSearch(e.target.value)}
            />
          </div>

          {/* Filter presets */}
          {logs.length > 0 && (
            <div className="presets-bar">
              {presets.map(p => (
                <div key={p.id} className="preset-chip" onClick={() => applyPreset(p)} title={`Apply preset "${p.name}"`}>
                  {p.name}
                  <button className="preset-chip-del" onClick={(e) => { e.stopPropagation(); deletePreset(p.id); }} title="Delete preset">
                    <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div>
              ))}
              {savingPreset ? (
                <div className="preset-name-form">
                  <input
                    className="preset-name-input"
                    placeholder="Preset name…"
                    value={presetName}
                    onChange={e => setPresetName(e.target.value)}
                    onKeyDown={e => { if (e.key === 'Enter') savePreset(presetName); if (e.key === 'Escape') { setSavingPreset(false); setPresetName(''); } }}
                    autoFocus
                  />
                  <button className="action-btn" onClick={() => savePreset(presetName)}>Save</button>
                </div>
              ) : (
                <button className="preset-save-btn" onClick={() => setSavingPreset(true)} title="Save current filters as preset">
                  <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  Save filters
                </button>
              )}
            </div>
          )}

          <div className="class-list">
            {filteredClasses.map(([cls, count]) => (
              <label key={cls} className="class-item">
                <input type="checkbox" checked={!!checked[cls]} onChange={() => toggleClass(cls)} />
                <span className="class-label" title={cls} style={{color: clsColor(cls, lightMode)}}>{cls}</span>
                <span className="class-count">{count}</span>
              </label>
            ))}
          </div>

          {/* Time filter */}
          <div className="time-filter">
            <div className="time-filter-label">Time range</div>
            <div className="time-inputs">
              <div className="time-row">
                <span>From</span>
                <input value={timeFrom} onChange={e => setTimeFrom(e.target.value)} placeholder="05:24:30" />
              </div>
              <div className="time-row">
                <span>To</span>
                <input value={timeTo} onChange={e => setTimeTo(e.target.value)} placeholder="05:25:00" />
              </div>
            </div>
            {(timeFrom || timeTo) && (
              <button className="time-clear" onClick={() => { setTimeFrom(''); setTimeTo(''); }}>
                Clear time filter
              </button>
            )}
          </div>
        </div>

        {/* Log pane */}
        <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden', position:'relative'}}>
          {/* Collapse/expand all bar — shown when grouping or dedup is active */}
          {logs.length > 0 && (groupByClass || dedupLogs) && (
            <div className="collapse-all-bar">
              <span>{groupByClass ? 'Groups' : 'Duplicates'}:</span>
              <button className="action-btn" onClick={() => setCollapseAll(true)}>Collapse all</button>
              <button className="action-btn" onClick={() => setCollapseAll(false)}>Expand all</button>
              {collapseAll !== null && <button className="action-btn" onClick={() => setCollapseAll(null)}>Reset</button>}
            </div>
          )}
          {/* Session banner */}
          {logs.length > 0 && (
            <div className={`session-banner${currentSession === 'foreground' ? ' fg' : currentSession === 'background' ? ' bg' : ' none'}`}>
              <div className="session-dot" />
              {currentSession === 'foreground' && '▶ App in Foreground'}
              {currentSession === 'background' && '⏸ App in Background'}
              {!currentSession && 'No session detected yet'}
            </div>
          )}
          {/* Column header */}
          {logs.length > 0 && (
            <div className="log-header" style={{fontSize: Math.max(9, fontSize - 2)}}>
              <div className="log-header-btns" />
              <div className="log-header-time">Time</div>
              <div className="log-header-delta">Δ</div>
              <div className="log-header-class">Class</div>
              <div className="log-header-msg">Message</div>
            </div>
          )}
          <div style={{flex:1, display:'flex', overflow:'hidden', position:'relative'}}>
          {showStats && (
            <StatsPanel
              logs={logs}
              visibleLogs={visibleLogs}
              bookmarks={bookmarks}
              onClose={() => setShowStats(false)}
              lightMode={lightMode}
            />
          )}
          <div className="log-pane" ref={logPaneRef} style={{fontSize, flex:1}}>
          {logs.length === 0 ? (
            <div className="empty-state">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" strokeWidth="1.5">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
              </svg>
              <p>Upload a log file or paste log text</p>
              <div className="empty-state-actions">
                <button className="upload-btn" onClick={() => fileInputRef.current.click()}>Upload .txt</button>
                <span className="empty-state-divider">or</span>
                <button className="upload-btn" style={{background:'transparent',border:'1px solid var(--accent)',color:'var(--accent-light)'}} onClick={openPasteModal}>Paste logs</button>
                <span className="empty-state-divider">or press</span>
                <kbd>⌘V</kbd>
              </div>
              <small>Supports the standard Android log format</small>
            </div>
          ) : visibleLogs.length === 0 ? (
            <div className="empty-state"><p>No logs match the current filters</p></div>
          ) : groupByClass && groups ? (
            groups.map((g, gi) => (
              <ClassGroup
                key={`g-${gi}-${wrapLines}`}
                entries={g.entries}
                globalWrap={wrapLines}
                searchRegex={searchRegex}
                bookmarks={bookmarks}
                onBookmark={toggleBookmark}
                deltas={deltas}
                startDeltaIdx={g.startDeltaIdx}
                collapseAll={collapseAll}
                currentMatchLogId={currentMatchLogId}
                fontSize={fontSize}
                lightMode={lightMode}
                onContextMenu={openCtxMenu}
                onHideClass={hideClass}
              />
            ))
          ) : dedupLogs && dedupGroups ? (
            dedupGroups.map((g, gi) => (
              <DedupGroup
                key={`d-${gi}-${wrapLines}`}
                entries={g.entries}
                globalWrap={wrapLines}
                searchRegex={searchRegex}
                bookmarks={bookmarks}
                onBookmark={toggleBookmark}
                deltas={deltas}
                startDeltaIdx={g.startDeltaIdx}
                collapseAll={collapseAll}
                currentMatchLogId={currentMatchLogId}
                fontSize={fontSize}
                lightMode={lightMode}
                onContextMenu={openCtxMenu}
                onHideClass={hideClass}
              />
            ))
          ) : (
            <VirtualList
              items={visibleLogs}
              containerRef={logPaneRef}
              renderItem={(e, i) => (
                <LogEntry
                  key={`${e.id}-${wrapLines}`}
                  entry={e}
                  globalWrap={wrapLines}
                  searchRegex={searchRegex}
                  bookmarked={bookmarks.has(e.id)}
                  onBookmark={toggleBookmark}
                  delta={deltas[i]}
                  isCurrent={currentMatchLogId === e.id}
                  fontSize={fontSize}
                  lightMode={lightMode}
                  onContextMenu={openCtxMenu}
                  onHideClass={hideClass}
                />
              )}
            />
          )}
          </div>
          <Minimap
            visibleLogs={visibleLogs}
            bookmarks={bookmarks}
            containerRef={logPaneRef}
            onJump={handleTimelineJump}
          />
          </div>
        {/* Scroll to top / bottom */}
        {logs.length > 0 && (
          <div className="scroll-jump-btns">
            <button className="scroll-jump-btn" onClick={() => logPaneRef.current?.scrollTo({top:0,behavior:'smooth'})} title="Scroll to top">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="18 15 12 9 6 15"/></svg>
            </button>
            <button className="scroll-jump-btn" onClick={() => logPaneRef.current?.scrollTo({top:logPaneRef.current.scrollHeight,behavior:'smooth'})} title="Scroll to bottom">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
          </div>
        )}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
