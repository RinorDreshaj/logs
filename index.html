<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log Filter</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens ── */
    :root {
      --bg:          #0f1117;
      --bg-panel:    #1a1d27;
      --bg-sidebar:  #13151f;
      --bg-input:    #1a1d27;
      --bg-hover:    #1a1d27;
      --bg-hover2:   #1e2030;
      --border:      #2d3148;
      --border2:     #3d4168;
      --text:        #e2e8f0;
      --text-dim:    #94a3b8;
      --text-muted:  #64748b;
      --text-faint:  #475569;
      --text-faintest: #334155;
      --text-label:  #cbd5e1;
      --accent:      #4f46e5;
      --accent-hover:#4338ca;
      --accent-light:#a5b4fc;
      --accent-bg:   #1e1b4b;
      --accent-border:#3730a3;
      --cls-color:   #818cf8;
      --time-color:  #4a5568;
      --delta-color: #2d4a2d;
      --mark-bg:     #854d0e;
      --mark-fg:     #fde68a;
      --bookmark-bg: #1a1a2e;
      --err-border:  #7f1d1d;
      --err-text:    #f87171;
      --err-hover:   #450a0a;
      --warn-border: #78350f;
      --warn-text:   #fbbf24;
      --warn-hover:  #431407;
    }

    body.light {
      --bg:          #f8f9fc;
      --bg-panel:    #ffffff;
      --bg-sidebar:  #f1f3f8;
      --bg-input:    #ffffff;
      --bg-hover:    #eef0f7;
      --bg-hover2:   #e8eaf3;
      --border:      #d1d5e8;
      --border2:     #b0b7d4;
      --text:        #1e2030;
      --text-dim:    #4a5580;
      --text-muted:  #6b7499;
      --text-faint:  #8890b0;
      --text-faintest:#b0b7d4;
      --text-label:  #374060;
      --accent:      #4f46e5;
      --accent-hover:#4338ca;
      --accent-light:#4f46e5;
      --accent-bg:   #ede9fe;
      --accent-border:#c4b5fd;
      --cls-color:   #4f46e5;
      --time-color:  #8890b0;
      --delta-color: #a3b8a3;
      --mark-bg:     #fef08a;
      --mark-fg:     #713f12;
      --bookmark-bg: #ede9fe;
      --err-border:  #fca5a5;
      --err-text:    #dc2626;
      --err-hover:   #fee2e2;
      --warn-border: #fcd34d;
      --warn-text:   #d97706;
      --warn-hover:  #fef3c7;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #root { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    .header {
      padding: 14px 20px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .header h1 { font-size: 16px; font-weight: 600; color: var(--accent-light); letter-spacing: .3px; }

    .upload-btn {
      padding: 6px 14px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .upload-btn:hover { background: var(--accent-hover); }

    .clear-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      background: transparent;
      color: var(--err-text);
      border: 1px solid var(--err-border);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .clear-btn:hover { background: var(--err-hover); border-color: var(--err-text); }

    .file-name {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .string-search-wrap {
      position: relative;
      flex: 1;
      min-width: 180px;
      max-width: 380px;
    }
    .string-search {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      width: 100%;
    }
    /* search history dropdown */
    .search-history-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--bg-panel);
      border: 1px solid var(--border2);
      border-radius: 7px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      z-index: 100;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .search-history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 10px 3px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-faint);
      border-bottom: 1px solid var(--border);
    }
    .search-history-clear {
      font-size: 10px;
      color: var(--text-muted);
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      text-transform: none;
      letter-spacing: 0;
    }
    .search-history-clear:hover { color: var(--err-text); }
    .search-history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-dim);
      font-family: 'SF Mono','Fira Code',monospace;
      transition: background .1s;
    }
    .search-history-item:hover, .search-history-item.active {
      background: var(--bg-hover2);
      color: var(--text);
    }
    .search-history-item svg { flex-shrink: 0; color: var(--text-faint); }
    .search-history-item-del {
      margin-left: auto;
      width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: transparent;
      color: var(--text-faintest); cursor: pointer; padding: 0;
      border-radius: 3px; flex-shrink: 0;
      visibility: hidden;
    }
    .search-history-item:hover .search-history-item-del { visibility: visible; }
    .search-history-item-del:hover { color: var(--err-text); }
    .string-search svg { flex-shrink: 0; opacity: .5; }
    .string-search input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13px;
      width: 100%;
    }
    .string-search input::placeholder { color: var(--text-muted); }
    .string-search:focus-within { border-color: var(--accent); }
    .string-search:focus-within svg { opacity: 1; }

    /* regex toggle */
    .regex-toggle {
      padding: 2px 7px;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .regex-toggle:hover { border-color: var(--accent); color: var(--accent-light); }
    .regex-toggle.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent-light); }
    .regex-error { color: #f87171; font-size: 11px; }

    kbd {
      display: inline-block;
      padding: 1px 5px;
      font-size: 10px;
      font-family: -apple-system, sans-serif;
      color: var(--text-faint);
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 3px;
      line-height: 1.5;
    }

    /* ── Timeline chart ── */
    .timeline-wrap {
      flex-shrink: 0;
      height: 52px;
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border);
      padding: 6px 16px 4px;
      display: flex;
      align-items: flex-end;
      gap: 1px;
      overflow: hidden;
      cursor: crosshair;
      position: relative;
    }
    .timeline-bar {
      flex: 1;
      min-width: 2px;
      border-radius: 2px 2px 0 0;
      transition: opacity .1s;
      cursor: pointer;
    }
    .timeline-bar:hover { opacity: .7; }
    .timeline-bar.in-range { background: #4f46e5 !important; }
    .timeline-label {
      position: absolute;
      top: 4px;
      left: 16px;
      font-size: 10px;
      color: var(--text-faint);
      pointer-events: none;
    }

    /* ── Class group ── */
    .group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 2px 4px 2px 4px;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      margin-bottom: 1px;
    }
    .group-header:hover { background: var(--bg-hover); }
    .group-toggle { color: var(--accent); font-size: 10px; flex-shrink: 0; width: 14px; }
    .group-cls { color: var(--cls-color); font-size: 11px; font-family: 'SF Mono','Fira Code',monospace; }
    .group-count { font-size: 10px; color: var(--text-faint); background: var(--bg-hover); border-radius: 10px; padding: 1px 6px; }
    .group-entries { border-left: 2px solid var(--bg-hover2); margin-left: 10px; margin-bottom: 2px; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .stats {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* icon buttons in header */
    .icon-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      font-size: 12px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .icon-btn:hover { background: var(--bg-hover2); color: var(--text); border-color: var(--border2); }
    .icon-btn:disabled { opacity: .35; cursor: default; }
    .icon-btn svg { flex-shrink: 0; }

    /* copied flash */
    .icon-btn.copied { border-color: #22c55e; color: #22c55e; }

    mark {
      background: var(--mark-bg);
      color: var(--mark-fg);
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ── Log level colors ── */
    .log-entry.level-error { border-left: 2px solid #ef4444; padding-left: 4px; }
    .log-entry.level-warn  { border-left: 2px solid #f59e0b; padding-left: 4px; }
    .log-entry.level-info  { border-left: 2px solid #3b82f6; padding-left: 4px; }

    .log-entry.level-error .log-msg { color: #fca5a5; }
    .log-entry.level-warn  .log-msg { color: #f59e0b; }
    body.light .log-entry.level-error .log-msg { color: #dc2626; }
    body.light .log-entry.level-warn  .log-msg { color: #d97706; }

    /* ── Bookmark ── */
    .log-entry.bookmarked { background: var(--bookmark-bg); }
    .log-entry.bookmarked .log-time { color: var(--accent); }

    .bookmark-btn {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--text-faintest);
      cursor: pointer;
      padding: 0;
      transition: color .1s;
      align-self: flex-start;
      margin-top: 2px;
      visibility: hidden;
    }
    .log-entry:hover .bookmark-btn { visibility: visible; color: var(--text-muted); }
    .bookmark-btn.active { visibility: visible; color: #f59e0b; }
    .bookmark-btn:hover { color: #f59e0b !important; }

    /* ── Level filter pills ── */
    .level-filters {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .level-pill {
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .level-pill.error { border-color: var(--err-border); color: var(--err-text); background: transparent; }
    .level-pill.error.active { background: var(--err-hover); border-color: var(--err-text); }
    .level-pill.warn  { border-color: var(--warn-border); color: var(--warn-text); background: transparent; }
    .level-pill.warn.active  { background: var(--warn-hover); border-color: var(--warn-text); }
    .level-pill.bookmarks { border-color: var(--warn-border); color: #f59e0b; background: transparent; }
    .level-pill.bookmarks.active { background: var(--warn-hover); border-color: #f59e0b; color: #d97706; }

    /* ── Body layout ── */
    .body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width .2s ease;
    }
    .sidebar.collapsed {
      width: 32px;
      min-width: 32px;
    }
    .sidebar.collapsed > *:not(.sidebar-collapse-btn-wrap) { display: none; }
    .sidebar-collapse-btn-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 0;
      flex-shrink: 0;
    }
    .sidebar-collapse-btn {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); border-radius: 5px;
      background: transparent; color: var(--text-dim); cursor: pointer;
      transition: all .15s;
    }
    .sidebar-collapse-btn:hover { background: var(--bg-hover2); color: var(--text); border-color: var(--border2); }

    .sidebar-header {
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── Filter presets ── */
    .presets-bar {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .preset-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px 2px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-hover);
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .preset-chip:hover { border-color: var(--accent); color: var(--accent-light); background: var(--accent-bg); }
    .preset-chip-del {
      width: 13px; height: 13px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; border: none; background: transparent;
      color: var(--text-faint); cursor: pointer; padding: 0;
      transition: color .1s;
    }
    .preset-chip-del:hover { color: var(--err-text); }
    .preset-save-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 12px;
      border: 1px dashed var(--border); background: transparent;
      color: var(--text-faint); font-size: 11px; cursor: pointer;
      transition: all .15s; white-space: nowrap;
    }
    .preset-save-btn:hover { border-color: var(--accent); color: var(--accent-light); }

    /* preset name input overlay */
    .preset-name-form {
      display: flex; align-items: center; gap: 4px;
    }
    .preset-name-input {
      width: 110px; padding: 2px 6px;
      background: var(--bg-input); border: 1px solid var(--accent);
      border-radius: 5px; color: var(--text); font-size: 11px; outline: none;
    }

    .sidebar-actions {
      display: flex;
      gap: 6px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-search {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-search input {
      width: 100%;
      padding: 5px 8px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 12px;
      outline: none;
    }
    .sidebar-search input:focus { border-color: var(--accent); }
    .sidebar-search input::placeholder { color: var(--text-muted); }

    .action-btn {
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all .15s;
    }
    .action-btn:hover { background: var(--bg-hover2); color: var(--text); }

    .class-list {
      overflow-y: auto;
      flex: 1;
      padding: 6px 0;
    }

    .class-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      cursor: pointer;
      transition: background .1s;
      user-select: none;
    }
    .class-item:hover { background: var(--bg-hover); }

    .class-item input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .class-label {
      font-size: 12px;
      color: var(--text-label);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .class-count {
      font-size: 10px;
      color: var(--text-faint);
      background: var(--bg-hover);
      border-radius: 10px;
      padding: 1px 6px;
      flex-shrink: 0;
    }

    /* ── Time filter ── */
    .time-filter {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .time-filter-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .time-inputs {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .time-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .time-row span {
      font-size: 11px;
      color: var(--text-muted);
      width: 28px;
      flex-shrink: 0;
    }

    .time-row input {
      flex: 1;
      padding: 4px 7px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 11px;
      outline: none;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .time-row input:focus { border-color: var(--accent); }
    .time-row input::placeholder { color: var(--text-muted); }

    .time-clear {
      width: 100%;
      margin-top: 6px;
      padding: 4px;
      font-size: 11px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
    }
    .time-clear:hover { background: var(--bg-hover2); color: var(--text); }

    /* ── Log pane ── */
    .log-pane {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      padding: 12px 16px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.6;
    }

    .log-entry {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 3px 6px 3px 4px;
      border-radius: 4px;
      margin-bottom: 1px;
      min-width: max-content;
    }
    .log-entry.entry-wrapped { min-width: unset; }
    .log-entry:hover { background: var(--bg-hover); }
    .log-entry.current-match { outline: 1px solid var(--accent); outline-offset: -1px; background: var(--accent-bg); }

    /* per-row wrap toggle button */
    .wrap-btn {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      border: 1px solid transparent;
      background: transparent;
      color: #64748b;
      cursor: pointer;
      padding: 0;
      transition: all .1s;
      align-self: flex-start;
      margin-top: 2px;
      visibility: hidden;
    }
    .wrap-btn.visible { visibility: visible; border-color: var(--border); }
    .wrap-btn.is-wrapped { color: var(--accent); border-color: var(--accent-border); background: var(--accent-bg); }
    .wrap-btn:hover { color: var(--accent-light) !important; border-color: var(--accent) !important; background: var(--accent-bg); }

    /* wrapped indicator pill */
    .wrap-pill {
      display: inline-flex;
      align-items: center;
      font-size: 9px;
      font-family: -apple-system, sans-serif;
      color: var(--accent);
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      border-radius: 3px;
      padding: 0px 4px;
      margin-left: 4px;
      vertical-align: middle;
      letter-spacing: .3px;
      user-select: none;
      flex-shrink: 0;
    }

    .log-time {
      color: var(--time-color);
      white-space: nowrap;
      flex-shrink: 0;
      font-size: 11px;
      padding-top: 1px;
    }

    .log-delta {
      color: var(--delta-color);
      white-space: nowrap;

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useMemo, useRef } = React;

// ── Context menu ──────────────────────────────────────────────────────────────
function ContextMenu({ x, y, cls, onHideClass, onSoloClass, onClose }) {
  const { useEffect } = React;
  useEffect(() => {
    const handler = (e) => {
      if (e.type === 'keydown' && e.key !== 'Escape') return;
      onClose();
    };
    document.addEventListener('mousedown', handler);
    document.addEventListener('keydown', handler);
    return () => {
      document.removeEventListener('mousedown', handler);
      document.removeEventListener('keydown', handler);
    };
  }, [onClose]);

  // keep menu inside viewport
  const menuW = 220, menuH = 110;
  const left = Math.min(x, window.innerWidth  - menuW - 8);
  const top  = Math.min(y, window.innerHeight - menuH - 8);

  return (
    <div className="ctx-menu" style={{left, top}} onMouseDown={e => e.stopPropagation()}>
      <div className="ctx-menu-label">[{cls}]</div>
      <div className="ctx-menu-sep" />
      <div className="ctx-menu-item danger" onClick={() => { onHideClass(cls); onClose(); }}>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
        Hide class
      </div>
      <div className="ctx-menu-item" onClick={() => { onSoloClass(cls); onClose(); }}>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        Show only this class
      </div>
    </div>
  );
}

// ── per-class color palette ───────────────────────────────────────────────────
const CLASS_COLORS = [
  '#818cf8','#34d399','#f472b6','#fb923c','#38bdf8','#a78bfa',
  '#4ade80','#f87171','#fbbf24','#2dd4bf','#e879f9','#60a5fa',
];
const CLASS_COLORS_LIGHT = [
  '#4f46e5','#059669','#db2777','#ea580c','#0284c7','#7c3aed',
  '#16a34a','#dc2626','#d97706','#0d9488','#a21caf','#2563eb',
];
const clsColorCache = new Map();
let clsColorIdx = 0;
function clsColor(cls, light) {
  if (!clsColorCache.has(cls)) clsColorCache.set(cls, clsColorIdx++ % CLASS_COLORS.length);
  const i = clsColorCache.get(cls);
  return light ? CLASS_COLORS_LIGHT[i] : CLASS_COLORS[i];
}

// ── virtual list ──────────────────────────────────────────────────────────────
const ROW_HEIGHT = 22; // approximate px per row; used for overscan estimation

function VirtualList({ items, renderItem, containerRef, overscan = 20 }) {
  const { useEffect: ue, useState: us } = React;
  const [range, setRange] = us({ start: 0, end: Math.min(overscan * 3, items.length) });
  const spacerTopRef = useRef(null);
  const spacerBotRef = useRef(null);

  ue(() => {
    const el = containerRef.current;
    if (!el) return;
    const recalc = () => {
      const scrollTop = el.scrollTop;
      const height = el.clientHeight;
      const start = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - overscan);
      const end   = Math.min(items.length, Math.ceil((scrollTop + height) / ROW_HEIGHT) + overscan);
      setRange({ start, end });
    };
    recalc();
    el.addEventListener('scroll', recalc, { passive: true });
    const ro = new ResizeObserver(recalc);
    ro.observe(el);
    return () => { el.removeEventListener('scroll', recalc); ro.disconnect(); };
  }, [items.length, containerRef]);

  const topPx = range.start * ROW_HEIGHT;
  const botPx = Math.max(0, (items.length - range.end) * ROW_HEIGHT);

  return (
    <>
      <div ref={spacerTopRef} style={{height: topPx, flexShrink: 0}} />
      {items.slice(range.start, range.end).map((item, i) => renderItem(item, range.start + i))}
      <div ref={spacerBotRef} style={{height: botPx, flexShrink: 0}} />
    </>
  );
}

// ── per-entry row ─────────────────────────────────────────────────────────────
function fmtDelta(ms) {
  if (ms === null) return '';
  if (ms < 1000) return `+${ms}ms`;
  return `+${(ms/1000).toFixed(1)}s`;
}

function LogEntry({ entry, globalWrap, searchRegex, bookmarked, onBookmark, delta, isCurrent, fontSize, lightMode, onContextMenu, onHideClass }) {
  const [override, setOverride] = useState(null);
  const wrapped = override !== null ? override : globalWrap;
  const [isMultiLine, setIsMultiLine] = useState(false);
  const msgRef = useRef(null);

  const { useEffect } = React;
  useEffect(() => {
    if (!msgRef.current) return;
    const el = msgRef.current;
    const prev = el.style.whiteSpace;
    el.style.whiteSpace = 'nowrap';
    const overflows = el.scrollWidth > el.parentElement.clientWidth;
    el.style.whiteSpace = prev;
    setIsMultiLine(overflows);
  }, [entry.msg, searchRegex]);

  const toggleWrap = useCallback((ev) => {
    ev.stopPropagation();
    setOverride(prev => {
      if (prev === null) return !globalWrap;
      if (prev === globalWrap) return null;
      return !prev;
    });
  }, [globalWrap]);

  const isOverridden = override !== null;
  const levelClass = entry.level ? ` level-${entry.level}` : '';
  const sessionClass = entry.sessionMarker ? ` session-${entry.sessionMarker === 'foreground' ? 'fg' : 'bg'}` : '';
  const [copyFlash, setCopyFlash] = useState(false);

  const copyLine = useCallback((ev) => {
    ev.stopPropagation();
    navigator.clipboard.writeText(entryToLine(entry)).then(() => {
      setCopyFlash(true);
      setTimeout(() => setCopyFlash(false), 800);
    });
  }, [entry]);

  return (
    <div
      data-id={entry.id}
      {...(entry.sessionMarker ? {'data-session-marker': entry.sessionMarker} : {})}
      className={`log-entry${wrapped ? ' entry-wrapped' : ''}${levelClass}${sessionClass}${bookmarked ? ' bookmarked' : ''}${isCurrent ? ' current-match' : ''}`}
      style={fontSize ? {fontSize} : undefined}
      onContextMenu={onContextMenu ? (e) => { e.preventDefault(); onContextMenu(e.clientX, e.clientY, entry.cls); } : undefined}
    >
      {/* bookmark */}
      <button
        className={`bookmark-btn${bookmarked ? ' active' : ''}`}
        onClick={(ev) => { ev.stopPropagation(); onBookmark(entry.id); }}
        title={bookmarked ? 'Remove bookmark' : 'Bookmark'}
      >
        <svg width="11" height="11" viewBox="0 0 24 24" fill={bookmarked ? 'currentColor' : 'none'} stroke="currentColor" strokeWidth="2">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </button>
      {/* copy line */}
      <button className={`copy-line-btn${copyFlash ? ' flashed' : ''}`} onClick={copyLine} title="Copy line">
        {copyFlash
          ? <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>
          : <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        }
      </button>
      {/* hide class */}
      {onHideClass && (
        <button className="hide-cls-btn" onClick={(ev) => { ev.stopPropagation(); onHideClass(entry.cls); }} title={`Hide [${entry.cls}]`}>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      )}
      {/* wrap */}
      <button
        className={`wrap-btn${isMultiLine ? ' visible' : ''}${isOverridden && wrapped ? ' is-wrapped' : ''}`}
        onClick={toggleWrap}
        title={wrapped ? 'Collapse line' : 'Expand line'}
        style={{ visibility: isMultiLine ? 'visible' : 'hidden' }}
      >
        {wrapped
          ? <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="21" y2="3"/><line x1="3" y1="21" x2="14" y2="10"/></svg>
          : <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        }
      </button>
      <span className="log-time">{fmtTime(entry.time)}</span>
      <span className={`log-delta${delta >= 1000 ? delta >= 5000 ? ' vslow' : ' slow' : ''}`}>{fmtDelta(delta)}</span>
      <span className="log-class" style={{color: clsColor(entry.cls, lightMode)}}>[{entry.cls}]</span>
      <span ref={msgRef} className={`log-msg${wrapped ? ' msg-wrapped' : ' msg-nowrap'}`}>
        {highlight(entry.msg, searchRegex)}
        {isOverridden && wrapped && (
          <span className="wrap-pill" title="Individually expanded">expanded</span>
        )}
      </span>
    </div>
  );
}

function highlight(text, regex) {
  if (!regex) return text;
  const parts = [];
  let last = 0, m;
  regex.lastIndex = 0;
  while ((m = regex.exec(text)) !== null) {
    if (m.index > last) parts.push(text.slice(last, m.index));
    parts.push(<mark key={m.index}>{m[0]}</mark>);
    last = m.index + m[0].length;
    if (m[0].length === 0) { regex.lastIndex++; }
  }
  if (last < text.length) parts.push(text.slice(last));
  return parts.length ? parts : text;
}

// ── log level detection ───────────────────────────────────────────────────────
const LEVEL_ERROR = /error|exception|fatal|crash|failed/i;
const LEVEL_WARN  = /warn|warning/i;

function detectLevel(msg) {
  if (LEVEL_ERROR.test(msg)) return 'error';
  if (LEVEL_WARN.test(msg))  return 'warn';
  return null;
}

// ── foreground / background session detection ─────────────────────────────────
const FG_RE = /\*+\s*APP IS IN THE FOREGROUND/i;
const BG_RE = /\*+\s*APP IS IN THE BACKGROUND/i;

function detectSession(cls, msg) {
  const combined = `[${cls}] ${msg}`;
  if (FG_RE.test(combined)) return 'foreground';
  if (BG_RE.test(combined)) return 'background';
  return null;
}

// ── parser ───────────────────────────────────────────────────────────────────
// Format A: Mon Apr 27 2026 at 05:24:30:109 PM :    [ClassName] Message
const LOG_RE_A = /^(\w{3}\s+\w{3}\s+\d{1,2}\s+\d{4}\s+at\s+\d{2}:\d{2}:\d{2}:\d{3}\s+[AP]M)\s*:\s*\[([^\]]+)\]\s*(.*)/;
// Format B: 16:06:24.742  ClassName  L  Message  (Android logcat)
const LOG_RE_B = /^(\d{2}:\d{2}:\d{2}\.\d{3})\s{1,10}(\S+)\s{1,10}([VDIWEF])\s{1,4}(.*)/;

// map logcat single-letter level to our level names
function logcatLevel(letter) {
  if (letter === 'E' || letter === 'F') return 'error';
  if (letter === 'W') return 'warn';
  return null;
}

function parseLogs(text) {
  const lines = text.split('\n');
  const entries = [];
  let id = 0;
  let currentSession = null;
  for (const raw of lines) {
    const trimmed = raw.trim();
    if (!trimmed) continue;
    let time, cls, msg, level;
    const mA = trimmed.match(LOG_RE_A);
    if (mA) {
      time  = mA[1];
      cls   = mA[2];
      msg   = mA[3];
      level = detectLevel(mA[3]);
    } else {
      const mB = trimmed.match(LOG_RE_B);
      if (!mB) continue;
      time  = mB[1];          // HH:MM:SS.mmm
      cls   = mB[2];          // tag / class name
      msg   = mB[4];
      level = logcatLevel(mB[3]) ?? detectLevel(mB[4]);
    }
    const sessionMarker = detectSession(cls, msg);
    if (sessionMarker) currentSession = sessionMarker;
    entries.push({ id: id++, time, cls, msg, level, sessionMarker, session: currentSession });
  }
  return entries;
}

function parseLogTime(timeStr) {
  // Format A: "... at HH:MM:SS:mmm AM/PM"
  const mA = timeStr.match(/at\s+(\d{2}):(\d{2}):(\d{2}):(\d{3})\s+(AM|PM)/i);
  if (mA) {
    let h = parseInt(mA[1]), min = parseInt(mA[2]), sec = parseInt(mA[3]), ms = parseInt(mA[4]);
    const ampm = mA[5].toUpperCase();
    if (ampm === 'PM' && h !== 12) h += 12;
    if (ampm === 'AM' && h === 12) h = 0;
    return h * 3600000 + min * 60000 + sec * 1000 + ms;
  }
  // Format B: HH:MM:SS.mmm
  const mB = timeStr.match(/^(\d{2}):(\d{2}):(\d{2})\.(\d{3})$/);
  if (mB) {
    return parseInt(mB[1]) * 3600000 + parseInt(mB[2]) * 60000 + parseInt(mB[3]) * 1000 + parseInt(mB[4]);
  }
  return null;
}

function parseInputTime(str) {
  if (!str.trim()) return null;
  const m = str.trim().match(/^(\d{1,2}):(\d{2})(?::(\d{2})(?:[.:](\d{3}))?)?$/);
  if (!m) return null;
  const h = parseInt(m[1]), min = parseInt(m[2]),
        sec = m[3] ? parseInt(m[3]) : 0,
        ms  = m[4] ? parseInt(m[4]) : 0;
  return h * 3600000 + min * 60000 + sec * 1000 + ms;
}

function fmtTime(timeStr) {
  // Format A
  const mA = timeStr.match(/at\s+(\d{2}:\d{2}:\d{2}:\d{3}\s+[AP]M)/i);
  if (mA) return mA[1];
  // Format B — already short, return as-is
  return timeStr;
}

function entryToLine(e) {
  // reconstruct in whichever format it came in
  if (e.time.includes('at ')) return `${e.time} :    [${e.cls}] ${e.msg}`;
  return `${e.time}  ${e.cls}  ${e.msg}`;
}

// ── Minimap component ─────────────────────────────────────────────────────────
function Minimap({ visibleLogs, bookmarks, containerRef, onJump }) {
  const { useState: us } = React;
  const mapRef = useRef(null);
  const [hover, setHover] = us(null); // { pct, entry, x, y }

  const ticks = useMemo(() => {
    if (!visibleLogs.length) return [];
    const total = visibleLogs.length;
    return visibleLogs.flatMap((e, i) => {
      const pct = (i / total) * 100;
      const results = [];
      if (e.level === 'error')              results.push({ pct, color: '#ef4444', key: `e${e.id}`, entry: e });
      else if (e.level === 'warn')          results.push({ pct, color: '#f59e0b', key: `w${e.id}`, entry: e });
      if (bookmarks.has(e.id))              results.push({ pct, color: '#fbbf24', key: `b${e.id}`, entry: e });
      if (e.sessionMarker === 'foreground') results.push({ pct, color: '#22d3ee', key: `sf${e.id}`, entry: e });
      if (e.sessionMarker === 'background') results.push({ pct, color: '#f472b6', key: `sb${e.id}`, entry: e });
      return results;
    });
  }, [visibleLogs, bookmarks]);

  const getEntryAtY = useCallback((clientY) => {
    if (!mapRef.current || !visibleLogs.length) return null;
    const rect = mapRef.current.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
    const idx = Math.min(visibleLogs.length - 1, Math.floor(ratio * visibleLogs.length));
    return { entry: visibleLogs[idx], pct: ratio * 100 };
  }, [visibleLogs]);

  const handleMouseMove = useCallback((e) => {
    const result = getEntryAtY(e.clientY);
    if (!result) return;
    const rect = mapRef.current.getBoundingClientRect();
    setHover({ pct: result.pct, entry: result.entry, x: rect.left, y: e.clientY });
  }, [getEntryAtY]);

  const handleMouseLeave = useCallback(() => setHover(null), []);

  const handleClick = useCallback((e) => {
    const result = getEntryAtY(e.clientY);
    if (result) onJump(result.entry.id);
  }, [getEntryAtY, onJump]);

  if (!visibleLogs.length) return null;

  return (
    <>
      <div
        className="minimap"
        ref={mapRef}
        onClick={handleClick}
        onMouseMove={handleMouseMove}
        onMouseLeave={handleMouseLeave}
      >
        {ticks.map(t => (
          <div key={t.key} className="minimap-tick" style={{ top: `${t.pct}%`, background: t.color }} />
        ))}
        {hover && <div className="minimap-cursor" style={{ top: `${hover.pct}%` }} />}
      </div>
      {hover && (
        <div className="minimap-tooltip" style={{
          left: hover.x - 330,
          top: Math.min(hover.y - 10, window.innerHeight - 100),
        }}>
          <div className="minimap-tooltip-time">{fmtTime(hover.entry.time)}</div>
          <div className="minimap-tooltip-cls">[{hover.entry.cls}]</div>
          <div>{hover.entry.msg.slice(0, 200)}{hover.entry.msg.length > 200 ? '…' : ''}</div>
        </div>
      )}
    </>
  );
}

// ── Stats panel component ─────────────────────────────────────────────────────
function StatsPanel({ logs, visibleLogs, bookmarks, onClose, lightMode }) {
  const stats = React.useMemo(() => {
    if (!logs.length) return null;
    const errors = logs.filter(e => e.level === 'error').length;
    const warns  = logs.filter(e => e.level === 'warn').length;
    const times  = logs.map(e => parseLogTime(e.time)).filter(Boolean);
    const spanMs = times.length >= 2 ? Math.max(...times) - Math.min(...times) : 0;
    const fmtSpan = spanMs < 60000
      ? `${(spanMs/1000).toFixed(1)}s`
      : `${Math.floor(spanMs/60000)}m ${Math.round((spanMs%60000)/1000)}s`;
    const clsMap = {};
    for (const e of logs) clsMap[e.cls] = (clsMap[e.cls] || 0) + 1;
    const topCls = Object.entries(clsMap).sort((a,b) => b[1]-a[1]).slice(0, 5);
    const maxCls = topCls[0]?.[1] || 1;
    return { errors, warns, spanMs, fmtSpan, topCls, maxCls };
  }, [logs]);

  if (!stats) return null;

  return (
    <div className="stats-panel">
      <div className="stats-panel-header">
        Session Stats
        <button className="stats-panel-close" onClick={onClose}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div className="stats-row">
        <span className="stats-row-label">Total lines</span>
        <span className="stats-row-val">{logs.length.toLocaleString()}</span>
      </div>
      <div className="stats-row">
        <span className="stats-row-label">Visible (filtered)</span>
        <span className="stats-row-val">{visibleLogs.length.toLocaleString()}</span>
      </div>
      <div className="stats-row">
        <span className="stats-row-label">Errors</span>
        <span className={`stats-row-val${stats.errors > 0 ? ' error' : ''}`}>{stats.errors.toLocaleString()}</span>
      </div>
      <div className="stats-row">
        <span className="stats-row-label">Warnings</span>
        <span className={`stats-row-val${stats.warns > 0 ? ' warn' : ''}`}>{stats.warns.toLocaleString()}</span>
      </div>
      <div className="stats-row">
        <span className="stats-row-label">Bookmarks</span>
        <span className="stats-row-val">{bookmarks.size}</span>
      </div>
      {stats.spanMs > 0 && (
        <div className="stats-row">
          <span className="stats-row-label">Time span</span>
          <span className="stats-row-val">{stats.fmtSpan}</span>
        </div>
      )}
      <div className="stats-section-title">Top classes</div>
      {stats.topCls.map(([cls, count]) => (
        <div key={cls} className="stats-cls-bar-wrap">
          <span className="stats-cls-name" style={{color: clsColor(cls, lightMode)}} title={cls}>{cls}</span>
          <div className="stats-cls-bar-bg">
            <div className="stats-cls-bar-fill" style={{width: `${Math.round((count/stats.maxCls)*100)}%`}} />
          </div>
          <span className="stats-cls-count">{count}</span>
        </div>
      ))}
      <div style={{height:6}} />
    </div>
  );
}

// ── Timeline component ────────────────────────────────────────────────────────
function Timeline({ logs, visibleLogs, onJump }) {
  const { useMemo: um } = React;
  const BUCKETS = 80;

  const { bars, minT, bucketMs } = um(() => {
    if (!logs.length) return { bars: [], minT: 0, bucketMs: 1 };
    const times = logs.map(e => parseLogTime(e.time)).filter(t => t !== null);
    if (!times.length) return { bars: [], minT: 0, bucketMs: 1 };
    const minT = Math.min(...times), maxT = Math.max(...times);
    const span = maxT - minT || 1;
    const bucketMs = Math.ceil(span / BUCKETS);
    const total = new Array(BUCKETS).fill(0);
    const visible = new Array(BUCKETS).fill(0);
    const vSet = new Set(visibleLogs.map(e => e.id));
    for (const e of logs) {
      const t = parseLogTime(e.time);
      if (t === null) continue;
      const b = Math.min(Math.floor((t - minT) / bucketMs), BUCKETS - 1);
      total[b]++;
      if (vSet.has(e.id)) visible[b]++;
    }
    const maxCount = Math.max(...total, 1);
    return { bars: total.map((t, i) => ({ total: t, visible: visible[i], height: Math.max(2, Math.round((t / maxCount) * 36)) })), minT, bucketMs };
  }, [logs, visibleLogs]);

  if (!bars.length) return null;

  const handleClick = (i) => {
    const bucketFromMs = minT + i * bucketMs;
    const bucketToMs   = bucketFromMs + bucketMs;
    // find first visible entry that falls in this bucket
    const target = visibleLogs.find(e => {
      const t = parseLogTime(e.time);
      return t !== null && t >= bucketFromMs && t < bucketToMs;
    });
    if (target) onJump(target.id);
  };

  return (
    <div className="timeline-wrap" title="Click a bar to jump to that time">
      <span className="timeline-label">activity</span>
      {bars.map((b, i) => (
        <div
          key={i}
          className="timeline-bar"
          style={{ height: b.height, background: b.visible > 0 ? 'var(--accent)' : 'var(--bg-hover2)', opacity: b.total === 0 ? 0.2 : 1 }}
          onClick={() => b.total > 0 && handleClick(i)}
          title={`${b.visible}/${b.total} logs`}
        />
      ))}
    </div>
  );
}

// ── Class group ───────────────────────────────────────────────────────────────
function ClassGroup({ entries, globalWrap, searchRegex, bookmarks, onBookmark, deltas, startDeltaIdx, collapseAll, currentMatchLogId, fontSize, lightMode, onContextMenu, onHideClass }) {
  const { useEffect } = React;
  const [open, setOpen] = useState(entries.length <= 3);
  useEffect(() => {
    if (collapseAll === null) return;
    setOpen(!collapseAll);
  }, [collapseAll]);
  if (entries.length === 1) {
    return <LogEntry key={`${entries[0].id}-${globalWrap}`} entry={entries[0]} globalWrap={globalWrap} searchRegex={searchRegex} bookmarked={bookmarks.has(entries[0].id)} onBookmark={onBookmark} delta={deltas[startDeltaIdx]} isCurrent={currentMatchLogId === entries[0].id} fontSize={fontSize} lightMode={lightMode} onContextMenu={onContextMenu} onHideClass={onHideClass} />;
  }
  return (
    <div>
      <div className="group-header" onClick={() => setOpen(v => !v)}>
        <span className="group-toggle">{open ? '▾' : '▸'}</span>
        <span className="group-cls" style={{color: clsColor(entries[0].cls, lightMode)}}>[{entries[0].cls}]</span>
        <span className="group-count">{entries.length} lines</span>
        {!open && <span style={{fontSize:11,color:'var(--text-faint)',fontFamily:'SF Mono,monospace',marginLeft:4}}>{fmtTime(entries[0].time)} – {fmtTime(entries[entries.length-1].time)}</span>}
      </div>
      {open && (
        <div className="group-entries">
          {entries.map((e, i) => (
            <LogEntry key={`${e.id}-${globalWrap}`} entry={e} globalWrap={globalWrap} searchRegex={searchRegex} bookmarked={bookmarks.has(e.id)} onBookmark={onBookmark} delta={deltas[startDeltaIdx + i]} isCurrent={currentMatchLogId === e.id} fontSize={fontSize} lightMode={lightMode} onContextMenu={onContextMenu} onHideClass={onHideClass} />
          ))}
        </div>
      )}
    </div>
  );
}

// ── Dedup group ───────────────────────────────────────────────────────────────

    return <LogEntry entry={first} globalWrap={globalWrap} searchRegex={searchRegex} bookmarked={bookmarks.has(first.id)} onBookmark={onBookmark} delta={deltas[startDeltaIdx]} isCurrent={currentMatchLogId === first.id} fontSize={fontSize} lightMode={lightMode} onContextMenu={onContextMenu} onHideClass={onHideClass} />;
